name: Savings Bank Merger Watch (AI Agent Assisted)

# 기관 통폐합이 잦은 저축은행 업계 특성을 감안하여, 주기적으로 AI 에이전트에게
# "최근 저축은행 통폐합/명칭변경/폐업 뉴스"를 조사하도록 위임하는 이슈를 자동 생성합니다.
#   - 기본 작업 주체는 GitHub Copilot 코딩 에이전트(자동 배정)이며,
#     Claude Code 등 다른 AI 어시스턴트나 사람이 대신 처리해도 됩니다.
#   - 실제 뉴스 검색·판정은 AI 에이전트가 수행하고, 카탈로그 반영(merge)은 사람이 최종 검토합니다.
#   - 추적 부담을 줄이기 위해 열린 조사 이슈는 라벨 기준 항상 최대 1건입니다(단일 상시 이슈).

on:
  schedule:
    # 매주 수요일 00:00 UTC (한국시간 수요일 09:00) — 품질 리포트(월)와 요일을 분리.
    - cron: '0 0 * * 3'
  workflow_dispatch:
    inputs:
      assign_copilot:
        description: '조사 이슈를 GitHub Copilot 코딩 에이전트에 배정합니다(기본 작업 주체).'
        type: boolean
        default: true

permissions:
  contents: read
  issues: write

concurrency:
  group: savings-bank-merger-watch
  cancel-in-progress: false

jobs:
  merger-watch:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      ISSUE_LABEL: savings-bank-merger-watch
    steps:
      - uses: actions/checkout@v4

      - name: Extract savings bank entries from catalog
        id: extract
        run: |
          set -euo pipefail

          # Catalog.xml에서 DisplayName에 "저축은행"이 포함된 Service 항목을 추출합니다.
          grep -oP '<Service\s+Id="[^"]*"[^>]*DisplayName="[^"]*저축은행[^"]*"[^>]*Url="[^"]*"' \
            docs/Catalog.xml > matches.txt || true

          : > entries.md
          COUNT=0
          while IFS= read -r line; do
            ID=$(printf '%s' "$line" | grep -oP 'Id="\K[^"]*' | head -n1 || true)
            NAME=$(printf '%s' "$line" | grep -oP 'DisplayName="\K[^"]*' | head -n1 || true)
            URL=$(printf '%s' "$line" | grep -oP 'Url="\K[^"]*' | head -n1 || true)
            [ -z "$ID" ] && continue
            echo "- \`$ID\` — $NAME (<$URL>)" >> entries.md
            COUNT=$((COUNT + 1))
          done < matches.txt

          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "저축은행 항목 $COUNT건을 추출했습니다."

      - name: Build research issue body
        run: |
          set -euo pipefail
          STAMP=$(date -u '+%Y-%m-%d')
          {
            echo "<!-- savings-bank-merger-watch -->"
            echo "## 저축은행 통폐합 점검 요청 (${STAMP} 기준)"
            echo
            echo "저축은행 업계는 인수합병·통폐합·명칭변경이 잦습니다. 이 이슈는 주 1회 자동 생성/갱신되며,"
            echo "**AI 에이전트가 최근 업계 뉴스를 조사하여 카탈로그에 반영이 필요한 변경을 식별**하도록 위임합니다."
            echo
            echo "> **작업 주체**: 기본 배정은 GitHub Copilot 코딩 에이전트입니다. Claude Code 등 다른 AI"
            echo "> 어시스턴트나 사람이 대신 처리해도 됩니다. 검출·조사는 AI가, 카탈로그 반영(merge)은 사람이 최종 판정합니다."
            echo
            echo "### AI 에이전트 작업 지침"
            echo
            echo "1. 아래 카탈로그에 등록된 저축은행 목록을 기준으로, **최근(대략 지난 3~6개월) 국내 저축은행의 통폐합/인수합병/명칭변경/영업정지·폐업** 관련 뉴스를 검색하세요."
            echo "   - 참고 출처: 금융감독원, 저축은행중앙회(<https://www.fsb.or.kr/>), 주요 경제 뉴스."
            echo "2. 확인된 변경 건마다 다음을 정리하세요."
            echo "   - 대상 기관(현재 카탈로그 \`Id\`/\`DisplayName\`), 변경 유형(통폐합/명칭변경/폐업), 공식 발표·뉴스 **출처 URL**, 시점."
            echo "   - 카탈로그 반영 방향 제안: \`Url\` 교체 / \`DisplayName\`·\`Id\` 갱신 / 항목 삭제 / 신규 항목 추가."
            echo "3. **검증**: 변경 후보 기관의 현재 사이트 접속 상태를 확인하세요."
            echo
            echo '```bash'
            echo "dotnet run --file src/checksites.cs -- probe ./docs/ ./health-report/ --only <id1,id2,...>"
            echo '```'
            echo
            echo "4. 실제 반영이 필요한 건은 이 이슈에 코멘트로 근거(출처 URL 포함)와 함께 제안하고, 승인 후 PR로 처리하세요."
            echo "   - **자동 삭제 금지**: 폐업·통폐합으로 삭제가 필요한 항목은 반드시 사람의 승인을 받으세요."
            echo "5. 조사 결과 반영할 변경이 없으면, 확인한 범위를 코멘트로 남기고 이 이슈를 닫아도 됩니다. (다음 주 자동으로 새 조사 이슈가 열립니다.)"
            echo
            echo "### 현재 카탈로그의 저축은행 목록 (${{ steps.extract.outputs.count }}건)"
            echo
            if [ -s entries.md ]; then
              cat entries.md
            else
              echo "_(추출된 항목이 없습니다. 추출 로직을 확인하세요.)_"
            fi
            echo
            echo "---"
            echo "*generated by \`.github/workflows/savings-bank-merger-watch.yml\`*"
          } > issue-body.md

      - name: Create or refresh research issue (single open issue)
        env:
          ASSIGN_COPILOT: ${{ github.event.inputs.assign_copilot }}
        run: |
          set -euo pipefail

          gh label create "$ISSUE_LABEL" \
            --description "저축은행 통폐합 AI 점검 요청" --color D4C5F9 --force >/dev/null 2>&1 || true

          # 추적 부담 최소화: 열려 있는 조사 이슈는 라벨 기준 최대 1건.
          EXISTING=$(gh issue list --state open --label "$ISSUE_LABEL" \
            --limit 1 --json number --jq '.[0].number // empty')

          TITLE="[저축은행 통폐합 점검] 업계 통폐합 뉴스 조사 요청"

          if [ -n "${EXISTING}" ]; then
            echo "열린 조사 이슈 #$EXISTING 를 최신 목록으로 갱신합니다."
            gh issue edit "$EXISTING" --body-file issue-body.md
            NUM="$EXISTING"
          else
            echo "새 조사 이슈를 생성합니다."
            ISSUE_URL=$(gh issue create --title "$TITLE" --body-file issue-body.md --label "$ISSUE_LABEL")
            echo "생성됨: $ISSUE_URL"
            NUM=$(basename "$ISSUE_URL")
          fi

          # GitHub Copilot을 기본 작업 주체로 배정(스케줄 실행 포함).
          if [ "${ASSIGN_COPILOT:-true}" != "false" ] && [ -n "${NUM:-}" ]; then
            gh issue edit "$NUM" --add-assignee "@copilot" \
              || echo "Copilot 배정 실패 — Claude Code 등 다른 AI 어시스턴트/사람이 처리 가능."
          fi

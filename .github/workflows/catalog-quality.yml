name: Catalog Quality Check with Auto Issue Reporting

# 카탈로그 검사 도구(catalogutil.cs / checkimages.cs)를 주기적으로 실행하여
# 발견된 오류를 하나의 추적(tracking) 이슈로 자동 등록/갱신합니다.
# 검출은 자동, 실제 수정(카탈로그 갱신)은 사람 또는 AI 에이전트가 담당합니다.

on:
  schedule:
    # 매주 월요일 00:00 UTC (한국시간 월요일 09:00)
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      assign_copilot:
        description: '생성/갱신된 추적 이슈를 Copilot 코딩 에이전트에 배정합니다.'
        type: boolean
        default: false
  push:
    branches:
      - main
    paths:
      - 'docs/Catalog.xml'
      - 'docs/images/**'

permissions:
  contents: read
  issues: write

jobs:
  quality-check:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      ISSUE_LABEL: catalog-quality
      ISSUE_MARKER: '<!-- catalog-quality-report -->'
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # 이미지 검증 (오프라인, 결정론적): 누락/미사용 로고 이미지를 검출합니다.
      - name: Run image validation (checkimages.cs)
        id: checkimages
        run: |
          code=0
          dotnet run --file src/checkimages.cs -- ./docs/Catalog.xml ./docs/images \
            > checkimages.log 2>&1 || code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"

      # 스키마 검증 및 리소스 생성 (URL 접속성 경고 포함).
      - name: Run catalog validation (catalogutil.cs)
        id: catalogutil
        run: |
          code=0
          dotnet run --file src/catalogutil.cs -- ./docs/ ./outputs/ \
            > catalogutil.log 2>&1 || code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"

      - name: Build issue body and decide action
        id: report
        run: |
          set -euo pipefail

          IMAGES_EXIT="${{ steps.checkimages.outputs.exit_code }}"
          UTIL_EXIT="${{ steps.catalogutil.outputs.exit_code }}"

          # 도구가 문제(비정상 종료 코드)를 보고했는지 판단합니다.
          PROBLEMS=0
          if [ "${IMAGES_EXIT:-0}" != "0" ] || [ "${UTIL_EXIT:-0}" != "0" ]; then
            PROBLEMS=1
          fi
          echo "problems=$PROBLEMS" >> "$GITHUB_OUTPUT"

          {
            echo "$ISSUE_MARKER"
            echo "## 카탈로그 품질 검사 리포트"
            echo
            echo "이 이슈는 \`catalog-quality\` 워크플로우가 자동으로 생성/갱신합니다."
            echo "검출은 자동으로 이뤄지며, 실제 카탈로그 수정은 사람 또는 AI 에이전트가 담당합니다."
            echo
            echo "- **실행 시각(UTC)**: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo "- **커밋**: \`${GITHUB_SHA}\`"
            echo "- **워크플로우 실행**: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            echo "### 이미지 검증 (checkimages.cs) — 종료 코드 \`${IMAGES_EXIT:-N/A}\`"
            echo
            echo '```text'
            # ANSI 이스케이프가 남아 있을 경우를 대비해 제거합니다.
            sed -r 's/\x1B\[[0-9;]*[A-Za-z]//g' checkimages.log || cat checkimages.log
            echo '```'
            echo
            echo "### 스키마/URL 검증 (catalogutil.cs) — 종료 코드 \`${UTIL_EXIT:-N/A}\`"
            echo
            echo "> 참고: URL 접속성 경고에는 CI 환경의 일시적 네트워크 문제가 포함될 수 있습니다."
            echo
            echo '```text'
            sed -r 's/\x1B\[[0-9;]*[A-Za-z]//g' catalogutil.log || cat catalogutil.log
            echo '```'
            echo
            echo "### 권장 조치"
            echo
            echo "- **누락된 이미지**: 해당 서비스의 공식 로고를 \`docs/images/<Category>/<Id>.png\`로 추가하세요. (\`src/fetchfavicon.cs\` 참고)"
            echo "- **미사용 이미지**: Catalog.xml에서 삭제된 서비스의 이미지라면 함께 제거하세요."
            echo "- **스키마 오류**: Catalog.xml의 구조/속성을 XSD에 맞게 수정하세요."
            echo
            echo "수정 후 다음으로 재검증하세요:"
            echo
            echo '```bash'
            echo "dotnet run --file src/checkimages.cs -- ./docs/Catalog.xml ./docs/images"
            echo "dotnet run --file src/catalogutil.cs -- ./docs/ ./outputs/"
            echo '```'
            echo
            echo "---"
            echo "*generated by \`.github/workflows/catalog-quality.yml\`*"
          } > issue-body.md

      - name: Create or update tracking issue
        env:
          PROBLEMS: ${{ steps.report.outputs.problems }}
          ASSIGN_COPILOT: ${{ github.event.inputs.assign_copilot }}
        run: |
          set -euo pipefail

          # 라벨이 없으면 생성합니다.
          gh label create "$ISSUE_LABEL" \
            --description "자동 카탈로그 품질 검사 리포트" \
            --color BFD4F2 --force >/dev/null 2>&1 || true

          # 열려 있는 기존 추적 이슈를 찾습니다 (라벨 기준, 최대 1건).
          EXISTING=$(gh issue list --state open --label "$ISSUE_LABEL" \
            --limit 1 --json number --jq '.[0].number // empty')

          TITLE="[카탈로그 품질] 자동 검사에서 문제가 발견되었습니다"

          if [ "$PROBLEMS" = "1" ]; then
            if [ -n "$EXISTING" ]; then
              echo "기존 추적 이슈 #$EXISTING 를 갱신합니다."
              gh issue edit "$EXISTING" --body-file issue-body.md
              gh issue comment "$EXISTING" \
                --body "🔄 최신 검사 결과로 이슈 본문을 갱신했습니다. (실행 ${GITHUB_RUN_ID})"
              ISSUE_NUMBER="$EXISTING"
            else
              echo "새 추적 이슈를 생성합니다."
              ISSUE_URL=$(gh issue create --title "$TITLE" \
                --body-file issue-body.md --label "$ISSUE_LABEL")
              echo "생성됨: $ISSUE_URL"
              ISSUE_NUMBER=$(basename "$ISSUE_URL")
            fi

            # 요청 시 Copilot 코딩 에이전트에 배정 (best-effort).
            if [ "${ASSIGN_COPILOT:-false}" = "true" ] && [ -n "${ISSUE_NUMBER:-}" ]; then
              gh issue edit "$ISSUE_NUMBER" --add-assignee "@copilot" \
                || echo "Copilot 배정에 실패했습니다 (수동 배정이 필요할 수 있습니다)."
            fi
          else
            echo "문제가 발견되지 않았습니다."
            if [ -n "$EXISTING" ]; then
              echo "기존 추적 이슈 #$EXISTING 를 닫습니다."
              gh issue comment "$EXISTING" \
                --body "✅ 최신 자동 검사에서 더 이상 문제가 발견되지 않아 이슈를 닫습니다. (실행 ${GITHUB_RUN_ID})"
              gh issue close "$EXISTING"
            fi
          fi
